services:
  app:
    build: .
    environment:
      DOWNLOAD_SCHEDULE_SECONDS: "3600"
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - ./config.json:/app/config.json
      - ./downloads:/downloads
    command:
      [
        "uvicorn",
        "web_gui.app:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8765",
      ]
